name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules
        run: npx @electron/rebuild

      - name: Prepare tmux for bundle
        run: |
          brew install tmux

          TMUX_PREFIX=$(brew --prefix tmux)
          TMUX_BIN="${TMUX_PREFIX}/bin/tmux"
          cp "${TMUX_BIN}" resources/tmux
          chmod +x resources/tmux

          # Copy dynamic library dependencies from brew
          mkdir -p resources/lib
          BREW_PREFIX=$(brew --prefix)
          otool -L "${TMUX_BIN}" | awk '{print $1}' | grep "${BREW_PREFIX}" | while read -r lib; do
            cp "${lib}" resources/lib/
            libname=$(basename "${lib}")
            install_name_tool -change "${lib}" "@loader_path/lib/${libname}" resources/tmux
          done

          # Generate terminfo
          mkdir -p resources/terminfo/78
          infocmp -x xterm-256color > /tmp/xterm-256color.ti
          tic -o resources/terminfo /tmp/xterm-256color.ti

          # Verify
          echo "=== tmux dependencies ==="
          otool -L resources/tmux
          echo "=== lib contents ==="
          ls -la resources/lib/

      - name: Build & Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --publish always
