name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules
        run: npx @electron/rebuild

      - name: Prepare tmux for bundle
        run: |
          brew install tmux
          TMUX_BIN="$(brew --prefix tmux)/bin/tmux"
          cp "$TMUX_BIN" resources/tmux
          chmod +x resources/tmux

          # Copy dynamic library dependencies
          mkdir -p resources/lib
          BREW_PREFIX="$(brew --prefix)"
          for lib in $(otool -L "$TMUX_BIN" | grep "$BREW_PREFIX" | awk '{print $1}'); do
            cp "$lib" resources/lib/
          done

          # Rewrite tmux to use @loader_path/lib/
          for lib in resources/lib/*.dylib; do
            libname="$(basename "$lib")"
            original="$(otool -L resources/tmux | grep "$libname" | awk '{print $1}')"
            if [ -n "$original" ]; then
              install_name_tool -change "$original" "@loader_path/lib/$libname" resources/tmux
            fi
          done

          # Generate terminfo
          mkdir -p resources/terminfo/78
          infocmp -x xterm-256color > /tmp/xterm-256color.ti
          tic -o resources/terminfo /tmp/xterm-256color.ti

          # Verify
          echo "=== tmux dependencies ==="
          otool -L resources/tmux
          echo "=== lib contents ==="
          ls -la resources/lib/

      - name: Build & Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --publish always
