<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D-Terminal — Nippo</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <button class="sidebar-toggle" onclick="toggleSidebar()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-header-left">
          <span id="titleLabel" class="sidebar-view-label">日報</span>
          <!-- dropdown kept hidden for JS compat -->
          <div class="title-dropdown" style="display:none">
            <div class="title-dropdown-menu" id="titleDropdownMenu">
              <button class="title-dropdown-option active" id="optReport">日報</button>
              <button class="title-dropdown-option" id="optProject">プロジェクト</button>
              <button class="title-dropdown-option" id="optPages">メモ</button>
            </div>
          </div>
        </div>
        <button class="btn-settings" onclick="openSettings()" title="設定">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>

      <div id="reportControls">
        <div class="member-select-wrap">
          <select class="member-select" id="userSelect" onchange="switchUser(this.value)"></select>
        </div>
        <div class="sidebar-actions">
          <input type="date" id="newReportDate" class="date-input">
          <button class="btn-new" onclick="createNewReport()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            新しい日報を作成
          </button>
        </div>
      </div>

      <div id="projectControls" style="display:none">
        <div class="sidebar-actions">
          <button class="btn-new" onclick="createNewProject()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            新しいプロジェクト
          </button>
        </div>
      </div>

      <div id="pagesControls" style="display:none">
        <div class="sidebar-actions" style="display:flex;gap:6px">
          <button class="btn-new" onclick="createNewPage()" style="flex:1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            新しいメモ
          </button>
          <button class="btn-new btn-new-group" onclick="createPageGroup()" title="新しいグループ">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
          </button>
        </div>
      </div>

      <div class="sidebar-search-wrap" id="sidebarSearchWrap">
        <svg class="sidebar-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="sidebar-search" id="sidebarSearch" placeholder="検索..." oninput="filterSidebar(this.value)">
      </div>
      <div class="sidebar-list" id="sidebarList"></div>
    </aside>

    <div class="toast" id="toast"></div>

    <main class="main" id="main">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>
        <p id="emptyText">「新しい日報を作成」で始めましょう</p>
      </div>
      <div class="report-editor" id="editor" style="display:none"></div>
      <div class="project-editor" id="projectEditor" style="display:none"></div>
      <div class="project-editor" id="pageEditor" style="display:none"></div>
      <div class="settings-page" id="settingsPage" style="display:none"></div>
    </main>
  </div>

  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <div class="modal-title">設定</div>
      <div class="modal-label">チームメンバー</div>
      <div class="member-list-edit" id="memberListEdit"></div>
      <div class="add-member-row">
        <input class="add-member-input" id="newMemberInput" placeholder="名前を入力..." onkeydown="if(event.key==='Enter')addMember()">
        <button class="btn-add-member" onclick="addMember()">追加</button>
      </div>
      <button class="btn-close-modal" onclick="closeSettings()">閉じる</button>
    </div>
  </div>

  <button class="ai-fab" onclick="toggleAiChat()" title="AI アシスタント">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  </button>
  <div class="ai-chat-panel" id="aiChatPanel">
    <div class="ai-chat-header">
      <span class="ai-chat-title">AI アシスタント</span>
      <button class="ai-chat-close" onclick="toggleAiChat()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="ai-chat-messages" id="aiChatMessages">
      <div class="ai-msg bot">何でも指示してください。タスクの追加・変更、プロジェクトの設定、日報の操作などができます。</div>
    </div>
    <div id="aiImagePreview" style="display:none;padding:4px 12px"></div>
    <div class="ai-chat-input-wrap">
      <button class="ai-chat-attach" onclick="document.getElementById('aiImageInput').click()" title="画像を添付">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </button>
      <input type="file" id="aiImageInput" accept="image/*" style="display:none" onchange="handleAiImageSelect(this)">
      <input class="ai-chat-input" id="aiChatInput" placeholder="指示を入力..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAiChat()}" onpaste="handleAiImagePaste(event)">
      <button class="ai-chat-send" id="aiChatSendBtn" onclick="sendAiChat()">送信</button>
    </div>
  </div>

  <div class="modal-overlay" id="webhookHelpModal" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="modal" style="width:480px">
      <div class="modal-title">Webhook の設定方法</div>
      <div style="margin-bottom:20px">
        <div style="font-size:14px;font-weight:600;margin-bottom:6px">Slack</div>
        <ol style="font-size:13px;color:var(--text-secondary);padding-left:20px;line-height:2">
          <li>Slackの「App管理」→「Incoming Webhooks」を追加</li>
          <li>通知チャンネルを選択しWebhook URLをコピー</li>
          <li>上の入力欄にペースト</li>
        </ol>
      </div>
      <div style="margin-bottom:20px">
        <div style="font-size:14px;font-weight:600;margin-bottom:6px">Discord</div>
        <ol style="font-size:13px;color:var(--text-secondary);padding-left:20px;line-height:2">
          <li>チャンネル設定→連携サービス→ウェブフック作成</li>
          <li>URLをコピーしてペースト</li>
        </ol>
      </div>
      <button class="btn-close-modal" onclick="document.getElementById('webhookHelpModal').classList.remove('open')">閉じる</button>
    </div>
  </div>

  <script type="module" src="../assets/nippo-app.js"></script>
</body>
</html>
